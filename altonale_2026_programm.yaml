  ort: Hafenbahnhof
  titel: DIE DICKE TROMPETE
  kategorien:
  - musik altonale
  beschreibung: >-
    In der 2. Episode der 2. Staffel der DICKEN TROMPETE kommen wieder drei neue Musikerinnen
    zum Zuge – Hamburgs frei improvisierendes Lad*ies Orchestra. Diesmal mit viel
    Saitenspiel: Singende Säge, präparierte und verstärkte Violine, die kleine, aber
    fette Schnabeltrompete sowie Saxofon sorgen für wilde Akzente. Gewidmet der unbekannten
    Spelunken-Trompeterin aus dem Stummfilm "Die Carmen von St. Pauli" (D 1928). Das
    Konzert ist auch Teil von blurred edges – Festival für aktuelle Musik in Hamburg.
    Eine Veranstaltung des Hafenbahnhof.
