  ort: Platz der Republik
  titel: altonale Flohmarkt
  kategorien:
  - Märkte
  beschreibung: >-
    Jedes Jahr ein echtes Highlight der altonale: Der Flohmarkt, einer der größten
    und beliebtesten Trödelmärkte Hamburgs. Er zieht sich vom Paul-Nevermann-Platz
    über den Platz der Republik bis zum Altonaer Rathaus – mitten durchs Festivalgeschehen.
    Unter dem Motto „schöner Trödeln“ erwartet Besucher*innen ein hochwertiges Angebot
    – ganz ohne Neuwaren oder Sonderposten. Stattdessen gibt es liebevoll Ausgewähltes,
    Kurioses und Secondhand-Schätze – und das alles in entspannter Atmosphäre unter
    alten Platanen und im Grünen. 9–17 Uhr.
