  beschreibung: >-
    In der grünen Kulisse der Christianswiese ist auch dieses Jahr wieder geschäftiges
    Treiben: Es ist Kunstmarkt! Künstler*innen präsentieren und verkaufen ihre Werke
    – von Malerei, Zeichnung, Grafik und Fotografie bis Skulptur und Urban Art. Alle
    Künstler*innen sind persönlich anwesend. Am Sonntag findet zudem die große Kunstauktion
