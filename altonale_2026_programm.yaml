  ort: Alma-Wartenberg-Platz
  titel: Keine mehr! – Eine Aktion zur Errichtung eines Mahnmals gegen Feminizide
  kategorien:
  - altonale specials
  beschreibung: >-
    Gewalt gegen Frauen* ist allgegenwärtig und endet oft in der Ermordung von Frauen*
    – meist durch Partner, Ex-Partner, Brüder oder Väter. Auf dem Alma-Wartenberg-Platz
    finden seit Jahren Gedenkveranstaltungen statt; eine Gruppe von Anwohnerinnen
    hat selbstorganisiert ein Mahnmal aufgestellt, das beschädigt und entwendet wurde.
    Nun verhandelt die Gruppe mit dem Bezirk Altona über ein dauerhaftes Mahnmal.
    An diesem Tag besteht Gelegenheit zum Austausch, zu Fragen und kreativer Mitgestaltung.
    13–16 Uhr.
