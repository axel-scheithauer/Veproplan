  dauer: 60 Min.
  beschreibung: >-
    Workshop, 60 Min., ab 10 Jahren, Deutsch, max. 8 Teilnehmende, mit Anmeldung.
    Laura Hormaetxe und Moritz Etorena vom ARIMA Kunstkollektiv bringen über 25 Jahre
    internationale Erfahrung als Graffiti-Künstler*innen und Kunstpädagog*innen ins
    HausDrei. Erlerne den Umgang mit der Spraydose und melde dich für einen ihrer
