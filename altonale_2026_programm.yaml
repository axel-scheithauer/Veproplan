  ort: HausDrei – Stadtteilkulturzentrum in Altona-Altstadt
  titel: Klapping (DE)
  kategorien:
  - STAMP Kids Space & Teens Stage
  dauer: 90 Min.
  beschreibung: >-
    Workshop, 90 Min., ab 6 Jahren, Deutsch, max. 25 Teilnehmende. Klapping ist ein
    Workshop auf dem Sportplatz des HausDrei, an der Schnittstelle von Fußball, Tanz
    und kollektivem Ritual. Ausgehend von Rhythmen, Gesten und Codes des Fußballs
    entsteht eine eigene, kraftvolle Bewegungssprache, die gemeinsam mit einfachen
    Übungen und präzisen Impulsen erkundet wird. Vorkenntnisse sind nicht nötig. Workshopleitung:
    Justine Kusi und Noah Tepe. Mit freundlicher Unterstützung der altoba-Stiftung
    der Altonaer Spar- und Bauverein eG. Eine Veranstaltung vom HausDrei e.V.
