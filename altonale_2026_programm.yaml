  titel: 'Theater Zeppelin: Pokko und die Trommel (DE)'
  kategorien:
  - STAMP Kids Space & Teens Stage
  dauer: 45 Min.
  beschreibung: >-
    Theater für Kinder, 45 Min., ab 3 Jahren, Deutsch, rollstuhlgerecht. Frösche lieben
    Fehler! Ein Frosch bekommt von seinen Eltern eine Trommel geschenkt. Doch das
    Trommeln zu Hause wird schnell zu laut, und so zieht der Frosch los in die Welt
    hinaus. Was wird für eine so große Reise eingepackt? Und was, wenn man etwas vergisst
    oder Sachen mitnimmt, die sich als großer Fehler herausstellen? Regie: Lionel
    Tomm. Mit freundlicher Unterstützung der altoba-Stiftung der Altonaer Spar- und
    Bauverein eG. Eine Veranstaltung vom HausDrei e.V.
