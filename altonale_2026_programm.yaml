  kategorien:
  - musik altonale
  beschreibung: >-
    Uraufführung "ESSENZ Ruth Zechlin Reloaded". Die wiederentdeckten Silesius-Gesänge
    der Komponistin Ruth Zechlin (1926–2007) erklingen posthum zum 100. Geburtstag,
    verbunden mit einem Auftragswerk von Julia Waldeck. Besetzung Sopran, Flöte, Orgel;
    mit Werken von Oxana Omelchuk. Mitwirkende: Irene Kurka (Sopran), Lucie Benediktová
    (Flöte), Kerstin Petersen (Orgel/Leitung). Ticketpflichtig (Pay-what-you-want).
