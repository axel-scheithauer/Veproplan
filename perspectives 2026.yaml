    Belastung im Arbeitsalltag entsteht selten plötzlich, sondern entwickelt sich
    meist schrittweise. Resilienz bedeutet deshalb nicht, mehr auszuhalten, sondern
    früher wahrzunehmen, wann die eigenen Grenzen erreicht sind, und bewusst darauf
    reagieren zu können. In diesem interaktiven Format wird ein Verständnis davon
